<!DOCTYPE html>
<html>
<head>
  <title>Private Search Portal</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    input {
      width: 500px;
      padding: 12px;
      font-size: 18px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>Private Search</h1>

<input id="q" placeholder="Search the web">
<button onclick="go()">Search</button>

<script>
function go() {
  const q = document.getElementById("q").value.trim();

  if (!q) return;

  window.location.href =
    "https://duckduckgo.com/?q=" +
    encodeURIComponent(q);
}
</script>

</body>
</html>
